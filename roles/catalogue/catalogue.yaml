- name: "Installing NodeJS into the database"
  hosts: role___be_
  tasks:
  - name: "echo hi"
    ansible.builtin.debug:
      msg: "Hello"
  - name: "Install NodeJS"
    become: true
    ansible.builtin.package:
      name: nodejs
      state: present
    register: install_output
  - name: "Status check"
    ansible.builtin.debug:
      msg: "{{ install_output['results'] }}"
  - name: "Add User roboshop"
    become: true
    ansible.builtin.user:
      name: roboshop
      comment: "roboshop system user"
      shell: /sbin/nologin
      home: /app
      system: true
  - name: "Create a directory /app"
    ansible.builtin.file:
      path: ~/app
      state: directory
      mode: '0755'