- name: "Installing NodeJS into the database"
  hosts: "role__be_"
  tasks:
  - name: "Install NodeJS"
    become: true
    ansible.builtin.package:
      name: nodejs
      state: present
  - name: "Add User roboshop"
    become: true
    ansible.builtin.user:
      name: roboshop
      comment: "roboshop system user"
      shell: /sbin/nologin
      home: /app
      system: true
  - name: "Create a directory /app"
    become: true
    ansible.builtin.file:
      path: /app
      state: directory
      mode: '0755'
  - name: "Downloading Scripts"
    ansible.builtin.get_url:
      url: "https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip"
      dest: "/tmp/catalogue.zip"
  - name: "Unzip the Scripts"
    become: true
    ansible.builtin.unarchive:
      remote_src: yes
      src: "/tmp/catalogue.zip"
      dest: "/app"
  - name: "Installing NodeJS Dependencies"
    become: true
    community.general.npm:
      path: "/app"
      executable: "/usr/bin/npm"
      state: present
  - name: "Deploy catalogue service file"
    become: true
    ansible.builtin.template:
      src: "catalogue.service.j2"
      dest: /etc/systemd/system/catalogue.service
  - name: "catalogue service start"
    become: true
    ansible.builtin.service:  
      name: catalogue
      enabled: yes
      state: started