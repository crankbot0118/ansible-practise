- name: "Provisioning the EC2 Instances and relevant tagging"
  hosts: local
  connection: local
  tasks:
  - name: "Provisioning the EC2 Instances"
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      key_name: "{{ SSH_KEY }}"
      instance_type: "{{ INST_TYPE }}"
      security_group: "{{ SG }}"
      image_id: "{{ IMG_ID }}"
    register: "ec2_output"
    loop: "{{ INST_NAMES }}"
  - name: "Extract Instance Details"
    set_fact:
      instance_ids: "{{ ec2_output.results | map(attribute='instance_ids') | flatten }}"
      instance_names: "{{ ec2_output.results | map(attribute='item') | flatten }}"
  - name: "Print outputs for understanding"
    ansible.builtin.debug:
      msg: "{{ instance_ids }}"
  - name: "Tagging EC2 created Instances for dynamic inventory"
    amazon.aws.ec2_tag:
      region: eu-east-1
      resource: "{{ item }}"
      state: present
      tags:
        Role: >-
          {% if "database" in item %}
          db
          {% elif "frontend" in item %}
          fe
          {% elif "backend" in item %}
          be
          {% elif %}
      loop: "{{ instance_names }}"
    loop: "{{ instance_ids }}"