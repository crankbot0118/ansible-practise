- name: "Provisioning the EC2 Instances and relevant tagging"
  hosts: local
  connection: local
  tasks:
  - name: "Provisioning the EC2 Instances"
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      key_name: "{{ SSH_KEY }}"
      instance_type: "{{ INST_TYPE }}"
      security_group: "{{ SG }}"
      image_id: "{{ IMG_ID }}"
    register: "ec2_output"
    loop: "{{ INST_NAMES }}"
  - name: "Print outputs for understanding"
    ansible.builtin.debug:
      # msg: |
      #   {{ ec2_output.results[0]['item']}}
      #   {{ ec2_output.results[1]['item']}}
      #   {{ ec2_output.results[2]['item']}}
      # msg: "{{ ec2_output.results | map(attribute='item') | join('\n') }}"
      msg: "{{ item }}"
    loop: "{{ ec2_output.results.instance_ids }}"
